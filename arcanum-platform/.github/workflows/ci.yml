name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # =============================================================================
  # FORMAT CHECK
  # =============================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # =============================================================================
  # CLIPPY LINTS
  # =============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

  # =============================================================================
  # BUILD & TEST
  # =============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features --workspace

  # =============================================================================
  # FEATURE MATRIX
  # =============================================================================
  feature-check:
    name: Feature Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check (no default features)
        run: |
          cargo check -p arcanum-hash --no-default-features
          cargo check -p arcanum-symmetric --no-default-features
          cargo check -p arcanum-signatures --no-default-features

      - name: Check (all features)
        run: cargo check --all-features --workspace

  # =============================================================================
  # MSRV CHECK
  # =============================================================================
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build with MSRV
        run: cargo build --all-features

  # =============================================================================
  # DOCUMENTATION
  # =============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # =============================================================================
  # MIRI (undefined behavior check)
  # =============================================================================
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Setup Miri
        run: cargo miri setup
      - name: Run Miri tests (arcanum-core)
        run: cargo miri test -p arcanum-core --lib
        env:
          MIRIFLAGS: -Zmiri-symbolic-alignment-check
      - name: Run Miri tests (arcanum-formats)
        run: cargo miri test -p arcanum-formats --lib
        env:
          MIRIFLAGS: -Zmiri-symbolic-alignment-check
      - name: Run Miri tests (arcanum-keystore)
        run: cargo miri test -p arcanum-keystore --lib --no-default-features
        env:
          MIRIFLAGS: -Zmiri-symbolic-alignment-check
